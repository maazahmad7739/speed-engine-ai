services:
  - type: web
    name: speed-engine-ai
    env: node
    plan: free
    buildCommand: node build.js
    startCommand: node backend/server.js
    envVars:
      - key: GEMINI_API_KEY
        sync: false
      - key: PUPPETEER_CACHE_DIR
        value: /opt/render/project/src/backend/.cache/puppeteer
